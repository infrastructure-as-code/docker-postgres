name: Build & Test Images
on:
  - push
  - pull_request
env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/postgres
jobs:
  build-only:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - distro: alpine
            version: "9.5-alpine"

          - distro: alpine
            version: "9.6-alpine"

          - distro: alpine
            version: "10-alpine"

          - distro: alpine
            version: "11-alpine"

          - distro: alpine
            version: "12-alpine"

          - distro: alpine
            version: "13-alpine"

          - distro: debian
            version: "9.5"

          - distro: debian
            version: "9.6"

          - distro: debian
            version: "10"

          - distro: debian
            version: "11"

          - distro: debian
            version: "12"

          - distro: debian
            version: "13"

          - distro: debian
            version: latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@v1
        with:
          image: tonistiigi/binfmt:latest
          platforms: all

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v1
        with:
          version: latest

      - name: Available platforms
        run: echo ${{ steps.buildx.outputs.platforms }}

      - name: Build image
        uses: docker/build-push-action@v1
        with:
          context: .
          file: ${{ matrix.distro }}.Dockerfile
          build_args: base_image=postgres:${{ matrix.version }}
          push: false
          tags: ${{ env.IMAGE }}:${{ matrix.version }}

      - run: docker images

      - name: Test alpine image
        env:
          IMAGE: ${{ env.IMAGE }}:${{ matrix.version }}
        run: docker-compose -f docker-compose.test.yml run sut
