name: Build & Push Images
on:
  push:
    branches:
      - main
      - ghcr
  schedule:
    # build a new set of images daily at 00:30hrs UTC so that we quickly
    # get updates from upstream images.
    - cron: '30 0 * * *'
env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/postgres
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - distro: alpine
            version: "9.5-alpine"

          - distro: alpine
            version: "9.6-alpine"

          - distro: alpine
            version: "10-alpine"

          - distro: alpine
            version: "11-alpine"

          - distro: alpine
            version: "12-alpine"

          - distro: alpine
            version: "13-alpine"

          - distro: debian
            version: "9.5"

          - distro: debian
            version: "9.6"

          - distro: debian
            version: "10"

          - distro: debian
            version: "11"

          - distro: debian
            version: "12"

          - distro: debian
            version: "13"
    steps:
      - uses: actions/checkout@v2

      - name: Login to GitHub Packages Docker Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@v1
        with:
          image: tonistiigi/binfmt:latest
          platforms: all

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v1
        with:
          version: latest

      - name: Available platforms
        run: echo ${{ steps.buildx.outputs.platforms }}

      - name: Build image
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ${{ matrix.distro }}.Dockerfile
          build-args: base_image=postgres:${{ matrix.version }}
          platforms: linux/amd64,linux/arm64/v8,linux/arm/v6
          push: false
          tags: ${{ env.IMAGE }}:${{ matrix.version }}

      - name: Test alpine image
        env:
          IMAGE: ${{ env.IMAGE }}:${{ matrix.version }}
        run: docker-compose -f docker-compose.test.yml run sut

      - name: Push image
        run: docker push ${{ env.IMAGE }}:${{ matrix.version }}

      - name: Inspect image
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:${{ matrix.version }}
