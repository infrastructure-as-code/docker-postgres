name: Docker Images
on: [push, pull_request]
env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/postgres
jobs:
  docker-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro: [alpine, debian]
        pg_version: [9.5, 9.6, 10, 11, 12, 13]
    steps:
      - uses: actions/checkout@v2

      - name: Login to GitHub Packages Docker Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@v1
        with:
          image: tonistiigi/binfmt:latest
          platforms: all

      - name: Available platforms
        run: echo ${{ steps.qemu.outputs.platforms }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v1
        with:
          version: latest

      - name: Available platforms
        run: echo ${{ steps.buildx.outputs.platforms }}

      - name: Build and push
        if: ${{ matrix.distro == 'alpine' }}
        uses: docker/build-push-action@v2
        with:
          context: ${{ matrix.distro }}/${{ matrix.pg_version }}-alpine
          file: ${{ matrix.distro }}/${{ matrix.pg_version }}-alpine/Dockerfile
          #platforms: linux/amd64,linux/arm64/v8,linux/arm/v6
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ matrix.pg_version }}-alpine

      - name: Inspect images
        if: ${{ matrix.distro == 'alpine' }}
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:${{ matrix.pg_version }}-alpine

      - name: Build and push
        if: ${{ matrix.distro == 'debian' }}
        uses: docker/build-push-action@v2
        with:
          context: ${{ matrix.distro }}/${{ matrix.pg_version }}
          file: ${{ matrix.distro }}/${{ matrix.pg_version }}/Dockerfile
          platforms: linux/amd64,linux/arm64/v8,linux/arm/v6
          push: true
          tags: ${{ env.IMAGE }}:${{ matrix.pg_version }}

      - name: Inspect images
        if: ${{ matrix.distro == 'debian' }}
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:${{ matrix.pg_version }}
